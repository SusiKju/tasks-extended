<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nachrichten von Papa</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#4f86f7" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4ff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      color: #1a1a2e;
    }
    .card {
      background: white;
      border-radius: 20px;
      padding: 32px 28px;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(79,134,247,0.12);
      text-align: center;
    }
    .icon { font-size: 56px; margin-bottom: 12px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p { font-size: 15px; color: #555; line-height: 1.5; margin-bottom: 24px; }
    button {
      background: #4f86f7;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 14px 28px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      transition: background 0.2s;
    }
    button:hover { background: #3a6fd8; }
    button:disabled { background: #a0b8f0; cursor: default; }
    #status {
      margin-top: 20px;
      font-size: 14px;
      color: #4f86f7;
      min-height: 20px;
    }
    .success { color: #22c55e !important; }
    .error   { color: #ef4444 !important; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📬</div>
    <h1>Nachrichten von Papa</h1>
    <p>Tippe auf den Knopf, damit Papa dir Nachrichten schicken kann – auch wenn du die Seite nicht geöffnet hast.</p>
    <button id="btn" onclick="subscribe()">Benachrichtigungen erlauben</button>
    <div id="status"></div>
  </div>

  <script>
    // ── Konfiguration ───────────────────────────────────────────────
    const NTFY_TOPIC = 'papa-zu-kind-AENDERE-MICH'; // <-- deinen Topic eintragen
    // ────────────────────────────────────────────────────────────────

    const btn    = document.getElementById('btn');
    const status = document.getElementById('status');

    async function subscribe() {
      if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
        setStatus('error', 'Dein Browser unterstützt Push leider nicht.');
        return;
      }
      btn.disabled = true;
      setStatus('', 'Einen Moment…');

      try {
        const reg = await navigator.serviceWorker.register('sw.js');
        await navigator.serviceWorker.ready;

        const perm = await Notification.requestPermission();
        if (perm !== 'granted') {
          setStatus('error', 'Benachrichtigungen wurden abgelehnt.');
          btn.disabled = false;
          return;
        }

        // ntfy.sh Web Push subscribe endpoint
        const sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: await getNtfyPublicKey()
        });

        // Subscription an ntfy schicken
        await fetch(`https://ntfy.sh/${NTFY_TOPIC}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action: 'subscribe', subscription: sub })
        });

        setStatus('success', '✅ Alles bereit! Papa kann dir jetzt Nachrichten schicken.');
        btn.textContent = 'Schon angemeldet ✓';
      } catch (e) {
        console.error(e);
        setStatus('error', 'Fehler: ' + e.message);
        btn.disabled = false;
      }
    }

    async function getNtfyPublicKey() {
      const res = await fetch(`https://ntfy.sh/${NTFY_TOPIC}/json?since=0&limit=0`, { method: 'GET' });
      // ntfy liefert VAPID key über /webpush endpoint
      const r2 = await fetch(`https://ntfy.sh/webpush?topic=${NTFY_TOPIC}`);
      const data = await r2.json();
      const raw = data.vapidPublicKey;
      return urlBase64ToUint8Array(raw);
    }

    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const rawData = atob(base64);
      return Uint8Array.from([...rawData].map(c => c.charCodeAt(0)));
    }

    function setStatus(type, msg) {
      status.textContent = msg;
      status.className = type;
    }

    // Beim Laden prüfen ob schon angemeldet
    window.addEventListener('load', async () => {
      if ('serviceWorker' in navigator) {
        const reg = await navigator.serviceWorker.register('sw.js');
        const sub = await reg.pushManager.getSubscription?.();
        if (sub) {
          btn.textContent = 'Schon angemeldet ✓';
          btn.disabled = true;
          setStatus('success', '✅ Bereit! Papa kann dir Nachrichten schicken.');
        }
      }
    });
  </script>
</body>
</html>
