<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nachrichten von Papa</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#4f86f7" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      color: #1a1a2e;
    }

    /* ── Task-Modus ── */
    #task-view { display: none; }
    #subscribe-view { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }

    .header {
      background: linear-gradient(135deg, #4f86f7, #6ea3ff);
      padding: 40px 24px 28px;
      text-align: center;
      color: white;
    }
    .header-emoji { font-size: 52px; margin-bottom: 8px; }
    .header h1 { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
    .header p { font-size: 15px; opacity: 0.85; }

    .progress-bar-wrap { background: rgba(255,255,255,0.25); border-radius: 99px; height: 8px; margin-top: 16px; overflow: hidden; }
    .progress-bar { background: white; height: 100%; border-radius: 99px; transition: width 0.5s ease; }

    .section { padding: 20px 16px 8px; }
    .section-label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; }

    .task-card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 12px rgba(79,134,247,0.07);
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      border: 1.5px solid transparent;
      -webkit-tap-highlight-color: transparent;
    }
    .task-card:active { transform: scale(0.98); }
    .task-card.done { opacity: 0.55; }
    .task-card.done .task-title { text-decoration: line-through; color: #aaa; }

    .checkbox {
      width: 30px; height: 30px; border-radius: 50%;
      border: 2.5px solid #d0d8f0;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      font-size: 16px;
    }
    .task-card.done .checkbox {
      background: #22c55e; border-color: #22c55e; color: white;
    }
    .task-title { font-size: 16px; font-weight: 600; color: #1a1a2e; flex: 1; }

    .empty { text-align: center; padding: 40px 20px; color: #aaa; font-size: 16px; }
    .loading { text-align: center; padding: 60px 20px; color: #aaa; font-size: 15px; }

    /* ── Schatzkiste-Belohnung ── */
    .reward {
      margin: 16px; padding: 18px 20px;
      background: linear-gradient(135deg, #fff7e0, #ffe9b8);
      border-radius: 20px;
      display: flex; align-items: center; gap: 16px;
      box-shadow: 0 2px 14px rgba(212,160,23,0.18);
      transition: box-shadow 0.3s;
    }
    .reward.full {
      background: linear-gradient(135deg, #ffe9b8, #ffd56b);
      animation: rewardGlow 1.1s ease infinite alternate;
    }
    @keyframes rewardGlow {
      from { box-shadow: 0 2px 14px rgba(212,160,23,0.2); }
      to   { box-shadow: 0 6px 30px rgba(255,193,7,0.65); }
    }
    .chest {
      font-size: 54px; line-height: 1; flex-shrink: 0;
      transition: transform 0.2s; will-change: transform;
    }
    .chest.pop { animation: chestPop 0.55s ease; }
    @keyframes chestPop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.35) rotate(-7deg); }
      70%  { transform: scale(0.9) rotate(5deg); }
      100% { transform: scale(1); }
    }
    .reward-body { flex: 1; min-width: 0; }
    .coins { font-size: 22px; font-weight: 800; color: #b8860b; }
    .coins .num { display: inline-block; transition: transform 0.2s; }
    .coins .num.bump { animation: numBump 0.45s ease; }
    @keyframes numBump {
      0% { transform: scale(1); } 45% { transform: scale(1.5); } 100% { transform: scale(1); }
    }
    .reward-msg { font-size: 13.5px; color: #9a7b1a; margin-top: 3px; font-weight: 600; }
    .reward-bar-wrap { background: rgba(184,134,11,0.18); border-radius: 99px; height: 7px; margin-top: 9px; overflow: hidden; }
    .reward-bar { background: linear-gradient(90deg,#f0b429,#d4a017); height: 100%; border-radius: 99px; width: 0%; transition: width 0.5s ease; }

    /* ── Belohnungspaket (TE-101) ── */
    .reward-unlock {
      margin: 0 16px 4px; padding: 16px 18px; border-radius: 18px;
      display: flex; align-items: center; gap: 14px;
    }
    .reward-unlock.unlocked {
      background: #e8fbef; border: 2px solid #22c55e;
    }
    .reward-unlock.teaser {
      background: #f6f7fb; border: 1px solid #e5e7eb;
    }
    .reward-unlock .ru-emoji { font-size: 56px; line-height: 1; flex-shrink: 0; }
    .reward-unlock .ru-body { flex: 1; min-width: 0; }
    .reward-unlock .ru-label { font-size: 15px; font-weight: 700; color: #1e8e45; }
    .reward-unlock .ru-title { font-size: 26px; font-weight: 900; color: #14532d; margin-top: 2px; }
    .reward-unlock .ru-detail { font-size: 15px; font-weight: 600; color: #1e8e45; margin-top: 2px; }
    .reward-unlock.teaser .ru-emoji { font-size: 40px; }
    .reward-unlock.teaser .ru-text { font-size: 14px; color: #6b7280; }
    .reward-unlock.teaser .ru-strong { font-size: 20px; font-weight: 900; color: #1a1a2e; margin-top: 1px; }
    .reward-unlock.teaser .ru-detail { font-size: 13px; font-weight: 600; color: #6b7280; }

    .spark {
      position: fixed; pointer-events: none; z-index: 998;
      font-size: 22px; will-change: transform, opacity;
      animation: sparkFloat 0.9s ease-out forwards;
    }
    @keyframes sparkFloat {
      0%   { transform: translate(0,0) scale(0.4); opacity: 0; }
      20%  { opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(1.2); opacity: 0; }
    }

    #coin-rain { position: fixed; inset: 0; pointer-events: none; z-index: 997; overflow: hidden; }
    .rain-item {
      position: absolute; top: -40px; font-size: 28px;
      animation: rainFall linear forwards;
    }
    @keyframes rainFall {
      to { transform: translateY(110vh) rotate(360deg); }
    }

    /* ── Subscribe-Modus ── */
    .card {
      background: white; border-radius: 20px; padding: 32px 28px;
      max-width: 360px; width: 100%;
      box-shadow: 0 4px 24px rgba(79,134,247,0.12); text-align: center;
    }
    .icon { font-size: 56px; margin-bottom: 12px; }
    h1.sub { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p.sub { font-size: 15px; color: #555; line-height: 1.5; margin-bottom: 24px; }
    button {
      background: #4f86f7; color: white; border: none; border-radius: 12px;
      padding: 14px 28px; font-size: 16px; font-weight: 600;
      cursor: pointer; width: 100%; transition: background 0.2s;
    }
    button:hover { background: #3a6fd8; }
    button:disabled { background: #a0b8f0; cursor: default; }
    #status { margin-top: 20px; font-size: 14px; color: #4f86f7; min-height: 20px; }
    .success { color: #22c55e !important; }
    .error   { color: #ef4444 !important; }
  </style>
</head>
<body>

<!-- ── Task-Ansicht ── -->
<div id="task-view">
  <div class="header">
    <div class="header-emoji" id="header-emoji">📋</div>
    <h1 id="header-title">Laden…</h1>
    <p id="header-sub"></p>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>
  </div>
  <div class="reward" id="reward">
    <div class="chest" id="chest">📦</div>
    <div class="reward-body">
      <div class="coins">🪙 <span class="num" id="coin-num">0</span></div>
      <div class="reward-msg" id="reward-msg">Noch leer – los geht's!</div>
      <div class="reward-bar-wrap"><div class="reward-bar" id="reward-bar"></div></div>
    </div>
  </div>
  <div class="reward-unlock" id="reward-unlock" style="display:none"></div>
  <div id="task-list-open" class="section">
    <div class="section-label">Noch offen</div>
    <div id="open-tasks"><div class="loading">Aufgaben laden…</div></div>
  </div>
  <div id="task-list-done" class="section" style="display:none">
    <div class="section-label">Schon geschafft 🏆</div>
    <div id="done-tasks"></div>
  </div>
</div>

<!-- ── Subscribe-Ansicht ── -->
<div id="subscribe-view">
  <div class="card">
    <div class="icon">📬</div>
    <h1 class="sub">Nachrichten von Papa</h1>
    <p class="sub">Tippe auf den Knopf, damit Papa dir Nachrichten schicken kann – auch wenn du die Seite nicht geöffnet hast.</p>
    <button id="btn" onclick="subscribe()">Benachrichtigungen erlauben</button>
    <div id="status"></div>
  </div>
</div>

<div id="coin-rain"></div>

<script type="module">
  // ── Firebase Konfiguration ───────────────────────────────────────
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, getDocs, doc, setDoc, updateDoc, onSnapshot }
    from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyCj035wtqQmy602C9iQAGbg_LzxXXjx4kU",
    authDomain: "tasks-extended-34507.firebaseapp.com",
    projectId: "tasks-extended-34507",
    storageBucket: "tasks-extended-34507.firebasestorage.app",
    messagingSenderId: "425277313752",
    appId: "1:425277313752:web:d43d2f3791591896e47dad"
  };
  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // ── ntfy Topic für Push ──────────────────────────────────────────
  const NTFY_TOPIC = 'papa-zu-kind-AENDERE-MICH';

  // ── Child-Namen ──────────────────────────────────────────────────
  const CHILD_NAMES = { lenny: 'Lenny', emil: 'Emil', hannes: 'Hannes', liddy: 'Liddy' };

  // ── Belohnungstypen (TE-101, gespiegelt aus kinderTasks.ts) ──────
  const REWARD_TYPES = {
    tv_series:   { emoji: '📺', label: 'TV-Serie' },
    tv_movie:    { emoji: '🎬', label: 'TV-Film' },
    screen_time: { emoji: '📱', label: 'Handyzeit' },
    sweet:       { emoji: '🍬', label: 'Süßigkeiten' },
    other:       { emoji: '🎁', label: 'Sonstiges' },
  };
  const TODAY = new Date().toISOString().slice(0, 10);

  // ── URL-Parameter lesen ──────────────────────────────────────────
  const params   = new URLSearchParams(location.search);
  const childId  = params.get('child');
  const childName = childId && CHILD_NAMES[childId] ? CHILD_NAMES[childId] : null;

  if (childName) {
    // ── Task-Modus ───────────────────────────────────────────────
    document.getElementById('subscribe-view').style.display = 'none';
    document.getElementById('task-view').style.display = 'block';
    document.getElementById('header-title').textContent = `Hey ${childName}! 👋`;

    let allTasks = [];
    let prevDoneCount = null;
    let currentReward = null;

    function render(tasks) {
      allTasks = tasks.filter(t => t.date === TODAY);
      const open = allTasks.filter(t => !t.done);
      const done = allTasks.filter(t =>  t.done);

      // Header
      const pct = allTasks.length ? Math.round(done.length / allTasks.length * 100) : 0;
      document.getElementById('progress-bar').style.width = pct + '%';
      if (allTasks.length === 0) {
        document.getElementById('header-sub').textContent = 'Noch keine Aufgaben heute.';
        document.getElementById('header-emoji').textContent = '😊';
      } else if (open.length === 0) {
        document.getElementById('header-sub').textContent = 'Alles erledigt – mega! 🎉';
        document.getElementById('header-emoji').textContent = '🏆';
      } else {
        document.getElementById('header-sub').textContent =
          `${done.length} von ${allTasks.length} erledigt`;
        document.getElementById('header-emoji').textContent = '📋';
      }

      // Offene Aufgaben
      const openEl = document.getElementById('open-tasks');
      if (open.length === 0) {
        openEl.innerHTML = `<div class="empty">Alle Aufgaben erledigt! 🎉</div>`;
        document.getElementById('task-list-open').style.display = 'block';
      } else {
        openEl.innerHTML = open.map(t => taskCard(t, false)).join('');
        document.getElementById('task-list-open').style.display = 'block';
      }

      // Erledigte Aufgaben
      const doneEl = document.getElementById('done-tasks');
      if (done.length > 0) {
        doneEl.innerHTML = done.map(t => taskCard(t, true)).join('');
        document.getElementById('task-list-done').style.display = 'block';
      } else {
        document.getElementById('task-list-done').style.display = 'none';
      }

      // Click-Handler
      document.querySelectorAll('.task-card').forEach(card => {
        card.addEventListener('click', () => toggleTask(
          card.dataset.id,
          card.dataset.done === 'true',
          decodeURIComponent(card.dataset.title || '')
        ));
      });

      // ── Schatzkiste-Belohnung ──
      updateReward(done.length, allTasks.length);
      if (prevDoneCount !== null && done.length > prevDoneCount) {
        chestPop();
        bumpCoins();
        if (open.length === 0 && allTasks.length > 0) celebrateFull();
        else burstSparkles();
      }
      prevDoneCount = done.length;

      // ── Belohnungspaket (TE-101) ──
      renderRewardUnlock();
    }

    // Belohnung anzeigen: freigeschaltet wenn alle Tagesaufgaben erledigt,
    // sonst als Ausblick ("schaff alles und du bekommst …").
    function renderRewardUnlock() {
      const el = document.getElementById('reward-unlock');
      const allDone = allTasks.length > 0 && allTasks.every(t => t.done);
      if (!currentReward || allTasks.length === 0) {
        el.style.display = 'none';
        return;
      }
      const meta = REWARD_TYPES[currentReward.type] || REWARD_TYPES.other;
      // Typ-Wort ist die Hauptaussage (auch ohne Lesen am Emoji erkennbar),
      // freier Titel ist optionale Unterzeile (TE-106).
      const detail = currentReward.title
        ? `<div class="ru-detail">${currentReward.title}</div>` : '';
      if (allDone) {
        el.className = 'reward-unlock unlocked';
        el.innerHTML = `
          <div class="ru-emoji">${meta.emoji}</div>
          <div class="ru-body">
            <div class="ru-label">🎉 Du hast gewonnen:</div>
            <div class="ru-title">${meta.label}</div>
            ${detail}
          </div>`;
      } else {
        el.className = 'reward-unlock teaser';
        el.innerHTML = `
          <div class="ru-emoji">${meta.emoji}</div>
          <div class="ru-body">
            <div class="ru-text">Schaff alles und du bekommst:</div>
            <div class="ru-strong">${meta.label}</div>
            ${detail}
          </div>`;
      }
      el.style.display = 'flex';
    }

    function rewardStage(doneCount, total) {
      if (total === 0)        return { emoji: '📦', msg: 'Noch keine Aufgaben heute' };
      if (doneCount === 0)    return { emoji: '📦', msg: "Noch leer – los geht's!" };
      const frac = doneCount / total;
      if (frac >= 1)          return { emoji: '🧰💎', msg: 'Voll! Du hast den Schatz geknackt! 🎉', full: true };
      if (frac >= 0.5)        return { emoji: '💰', msg: 'Schon halb voll – weiter so!' };
      return { emoji: '🪙', msg: 'Füllt sich… sammle mehr Münzen!' };
    }

    function updateReward(doneCount, total) {
      const s = rewardStage(doneCount, total);
      document.getElementById('chest').textContent = s.emoji;
      document.getElementById('coin-num').textContent = doneCount;
      document.getElementById('reward-msg').textContent = s.msg;
      const pct = total ? Math.round(doneCount / total * 100) : 0;
      document.getElementById('reward-bar').style.width = pct + '%';
      document.getElementById('reward').classList.toggle('full', !!s.full);
    }

    function chestPop() {
      const c = document.getElementById('chest');
      c.classList.remove('pop'); void c.offsetWidth; c.classList.add('pop');
    }

    function bumpCoins() {
      const n = document.getElementById('coin-num');
      n.classList.remove('bump'); void n.offsetWidth; n.classList.add('bump');
    }

    function burstSparkles() {
      const chest = document.getElementById('chest').getBoundingClientRect();
      const cx = chest.left + chest.width / 2;
      const cy = chest.top + chest.height / 2;
      const icons = ['✨','🪙','⭐','💛'];
      for (let i = 0; i < 8; i++) {
        const sp = document.createElement('div');
        sp.className = 'spark';
        sp.textContent = icons[Math.floor(Math.random() * icons.length)];
        sp.style.left = cx + 'px';
        sp.style.top  = cy + 'px';
        const ang = (Math.PI * 2 * i) / 8 + Math.random() * 0.5;
        const dist = 50 + Math.random() * 40;
        sp.style.setProperty('--dx', Math.cos(ang) * dist + 'px');
        sp.style.setProperty('--dy', Math.sin(ang) * dist - 20 + 'px');
        document.body.appendChild(sp);
        setTimeout(() => sp.remove(), 950);
      }
    }

    function celebrateFull() {
      burstSparkles();
      const rain = document.getElementById('coin-rain');
      const icons = ['🪙','💎','⭐','🎉','💰','✨'];
      for (let i = 0; i < 28; i++) {
        const it = document.createElement('div');
        it.className = 'rain-item';
        it.textContent = icons[Math.floor(Math.random() * icons.length)];
        it.style.left = Math.random() * 100 + 'vw';
        const dur = 2.2 + Math.random() * 1.8;
        it.style.animationDuration = dur + 's';
        it.style.animationDelay = Math.random() * 0.6 + 's';
        rain.appendChild(it);
        setTimeout(() => it.remove(), (dur + 0.7) * 1000);
      }
    }

    function taskCard(t, done) {
      return `<div class="task-card ${done ? 'done' : ''}" data-id="${t.id}" data-done="${done}" data-title="${encodeURIComponent(t.title)}">
        <div class="checkbox">${done ? '✓' : ''}</div>
        <span class="task-title">${t.title}</span>
      </div>`;
    }

    async function toggleTask(taskId, currentDone, title) {
      const newDone = !currentDone;
      const now = new Date().toISOString();
      try {
        await updateDoc(doc(db, 'children', childId, 'tasks', taskId), {
          done: newDone,
          completedAt: newDone ? now : null,
        });
        // Aktivitätslog (TE-97): Urheber = Kind
        try {
          const ref = doc(collection(db, 'children', childId, 'activity'));
          await setDoc(ref, {
            action: newDone ? 'completed' : 'reopened',
            taskId,
            taskTitle: title || '',
            actor: 'child',
            at: now,
          });
        } catch (logErr) {
          console.warn('Aktivitätslog fehlgeschlagen', logErr);
        }
      } catch (e) {
        console.error('Toggle fehlgeschlagen', e);
      }
    }

    // Echtzeit-Listener
    onSnapshot(collection(db, 'children', childId, 'tasks'), snap => {
      const tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      render(tasks);
    });

    // Belohnungs-Listener (TE-101): Belohnung liegt auf children/{childId}.reward
    onSnapshot(doc(db, 'children', childId), snap => {
      currentReward = snap.exists() ? (snap.data().reward ?? null) : null;
      renderRewardUnlock();
    });

  } else {
    // ── Subscribe-Modus (kein ?child Parameter) ──────────────────
    const btn    = document.getElementById('btn');
    const status = document.getElementById('status');

    window.subscribe = async function() {
      if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
        setStatus('error', 'Dein Browser unterstützt Push leider nicht.');
        return;
      }
      btn.disabled = true;
      try {
        setStatus('', 'Bitte im Dialog "Zulassen" tippen…');
        const perm = await Notification.requestPermission();
        if (perm !== 'granted') {
          setStatus('error', 'Benachrichtigungen wurden abgelehnt.');
          btn.disabled = false;
          return;
        }
        setStatus('', 'Wird eingerichtet…');
        const reg = await Promise.race([
          navigator.serviceWorker.register('sw.js'),
          new Promise((_, r) => setTimeout(() => r(new Error('SW Timeout')), 8000))
        ]);
        await Promise.race([
          navigator.serviceWorker.ready,
          new Promise((_, r) => setTimeout(() => r(new Error('SW ready Timeout')), 10000))
        ]);
        const vapidRes = await fetch('https://ntfy.sh/v1/webpush');
        if (!vapidRes.ok) throw new Error('VAPID-Key Fehler');
        const { vapid_public_key } = await vapidRes.json();
        const sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(vapid_public_key)
        });
        const r = await fetch('https://ntfy.sh/v1/webpush', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ topic: NTFY_TOPIC, subscription: sub.toJSON() })
        });
        if (!r.ok) throw new Error('ntfy Fehler ' + r.status);
        setStatus('success', '✅ Alles bereit! Papa kann dir Nachrichten schicken.');
        btn.textContent = 'Schon angemeldet ✓';
      } catch (e) {
        console.error(e);
        setStatus('error', 'Fehler: ' + e.message);
        btn.disabled = false;
      }
    };

    function setStatus(type, msg) {
      status.textContent = msg;
      status.className = type;
    }

    function urlBase64ToUint8Array(b64) {
      const pad = '='.repeat((4 - b64.length % 4) % 4);
      const raw = atob((b64 + pad).replace(/-/g, '+').replace(/_/g, '/'));
      return Uint8Array.from([...raw].map(c => c.charCodeAt(0)));
    }

    navigator.serviceWorker?.register('sw.js').then(async reg => {
      const sub = await reg.pushManager.getSubscription();
      if (sub) {
        btn.textContent = 'Schon angemeldet ✓';
        btn.disabled = true;
        setStatus('success', '✅ Bereit! Papa kann dir Nachrichten schicken.');
      }
    }).catch(() => {});
  }
</script>
</body>
</html>
